        function loadRemoteTools() {

    <h1 class="whitetext">Case Converter</h1>
    <p>Quickly switch text between camelCase, snake_case, PascalCase, and slug-case.</p>

    <div class="controls-grid">
        
        <div class="control-group">
            <h4 class="whitetext" style="margin: 0;">Format</h4>
            <label class="whitetext"><input type="radio" name="caseType" value="camel" checked onchange="handleLive()"> camelCase</label>
            <label class="whitetext"><input type="radio" name="caseType" value="snake" onchange="handleLive()"> snake_case</label>
            <label class="whitetext"><input type="radio" name="caseType" value="pascal" onchange="handleLive()"> PascalCase</label>
            <label class="whitetext"><input type="radio" name="caseType" value="slug" onchange="handleLive()"> slug-case</label>
        </div>
        
        <div class="control-group">
            <h4 class="whitetext" style="margin: 0;">Options</h4>
            <label class="whitetext"><input type="checkbox" id="liveMode" checked onchange="handleLive()"> Live Mode OFF/ON</label>
        </div>
    </div>

    <textarea id="inputText" class="text-box" placeholder="Enter text to convert..."></textarea><br>

    <div style="margin-bottom: 20px;">
        <button id="processBtn" class="action-btn" onclick="processText(true)">Process Manual</button>
        <button class="action-btn" onclick="copyResult()">Copy Result</button>
        <button class="action-btn" style="background: #ff6b6b; color: white;" onclick="clearAll()">Clear All</button>
    </div>

    <h3 class="whitetext">Result:</h3>
    <div id="result" class="result-box">Waiting for input...</div>

    <script>
        const inputText = document.getElementById('inputText');
        const resultElement = document.getElementById('result');
        const liveModeCheckbox = document.getElementById('liveMode');
        
        if (inputText) inputText.addEventListener('input', handleLive);

        function handleLive() {
            if (liveModeCheckbox.checked) processText(false); 
        }

        function copyResult() {
            const textToCopy = resultElement.textContent;
            if (textToCopy && textToCopy !== "Waiting for input...") {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const btn = event.target;
                    const originalText = btn.textContent;
                    btn.textContent = "Copied!";
                    setTimeout(() => btn.textContent = originalText, 1500);
                });
            }
        }

        function clearAll() {
            if (inputText) inputText.value = "";
            resultElement.innerHTML = "Waiting for input...";
        }

        function showAnimation(buttonId, actionText) {
            const button = document.getElementById(buttonId);
            const originalText = "Process Manual";
            button.textContent = actionText;
            button.classList.add('fade-in');
            setTimeout(() => {
                button.classList.remove('fade-in');
                button.classList.add('fade-out');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('fade-out');
                }, 250);
            }, 750);
        }

        
        function processText(triggerAnimation = false) {
            const text = inputText.value;
            const caseType = document.querySelector('input[name="caseType"]:checked').value;
            if (!text) { resultElement.innerHTML = "Waiting for input..."; return; }
            
            // Normalize input to words array
            const words = text.replace(/[-_]/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').toLowerCase().trim().split(/\s+/);
            
            let output = "";
            if (caseType === 'camel') {
                output = words.map((w, i) => i === 0 ? w : w.charAt(0).toUpperCase() + w.slice(1)).join('');
            } else if (caseType === 'snake') {
                output = words.join('_');
            } else if (caseType === 'pascal') {
                output = words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');
            } else if (caseType === 'slug') {
                output = words.join('-');
            }
            
            resultElement.textContent = output;
            if (triggerAnimation) showAnimation('processBtn', "Converted!");
        }
        
    </script>
</body>
